services:
  - type: web
    name: fire-tracker
    runtime: docker
    plan: free
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WU_API_KEY
        sync: false
      - key: LSA_SAF_USER
        sync: false
      - key: LSA_SAF_PASS
        sync: false
      - key: X_AUTH_TOKEN
        sync: false
      - key: X_CT0
        sync: false
