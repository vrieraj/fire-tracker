<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Fire Tracker</h1>
        <button id="btn-close-sidebar" aria-label="Cerrar">&times;</button>
      </header>
      <div id="search-box">
        <input type="text" id="search-input" placeholder="Buscar ubicacion..." autocomplete="off" />
        <ul id="search-results"></ul>
      </div>
      <div id="fire-count"></div>
      <ul id="fire-list"></ul>
      <div id="frp-legend">
        <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:4px">FRP — Detecciones satelitales</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="width:10px;height:10px;border-radius:50%;background:#ff0000;display:inline-block"></span>
          <span style="font-size:0.7rem">Reciente (&lt;24h)</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="width:10px;height:10px;border-radius:50%;background:#ee2255;display:inline-block"></span>
          <span style="font-size:0.7rem">1-3 días</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="width:10px;height:10px;border-radius:50%;background:#cc6688;display:inline-block"></span>
          <span style="font-size:0.7rem">3-5 días</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:50%;background:#aaaaaa;display:inline-block"></span>
          <span style="font-size:0.7rem">5-7 días</span>
        </div>
      </div>
      <footer id="sidebar-footer">
        <a href="https://github.com/vrieraj/fire-tracker" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" style="vertical-align: middle; margin-right: 4px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </footer>

    </aside>
    <main>
      <button id="btn-open-sidebar" aria-label="Menu">&#9776;</button>
      <div id="map"></div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
